{% extends "account/base.html" %}

{% block head_title %}Password updated{% endblock %}

{% block content %}

<div style="text-align:center;">
  <div style="width:72px;height:72px;background:var(--green-50);border:1.5px solid var(--green-200);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--green-500)" stroke-width="1.5">
      <path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/>
    </svg>
  </div>
  <h2 class="auth-form-title">Password updated</h2>
  <p style="font-size:0.9rem;color:var(--text-muted);line-height:1.7;margin-bottom:2rem;">
    Your password has been changed successfully. You can now sign in with your new password.
  </p>
  <a href="{% url 'account_login' %}" class="btn-primary" style="width:100%;justify-content:center;display:flex;padding:0.8rem;">
    Sign in
  </a>
</div>

{% endblock %}
