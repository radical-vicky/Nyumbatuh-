{% extends "account/base.html" %}
{% load i18n %}

{% block head_title %}Sign out{% endblock %}

{% block content %}

<div style="text-align:center;">
  <div style="width:64px;height:64px;background:var(--green-50);border:1.5px solid var(--green-200);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--green-500)" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
  </div>

  <h2 class="auth-form-title">Sign out?</h2>
  <p class="auth-form-sub">You are currently signed in as <strong>{{ user.email }}</strong>.</p>

  <form method="post" style="margin-top:1.75rem;">
    {% csrf_token %}
    <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:0.8rem;margin-bottom:0.75rem;">
      Yes, sign out
    </button>
    <a href="/" class="btn-secondary" style="width:100%;justify-content:center;display:flex;">
      Cancel
    </a>
  </form>
</div>

{% endblock %}
